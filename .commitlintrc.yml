# yaml-language-server: $schema=https://json.schemastore.org/commitlintrc.json
---
extends:
  - "@commitlint/config-conventional"

rules:
  # Allowed types — aligned with org PR templates and gitmoji conventions
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
      - security

  # Scopes are unrestricted org-wide — individual repos can narrow this
  scope-enum:
    - 0
    - always
    - []

  scope-case:
    - 2
    - always
    - lower-case

  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case

  subject-empty:
    - 2
    - never

  subject-full-stop:
    - 2
    - never
    - "."

  header-max-length:
    - 2
    - always
    - 100

  body-leading-blank:
    - 2
    - always

  footer-leading-blank:
    - 1
    - always

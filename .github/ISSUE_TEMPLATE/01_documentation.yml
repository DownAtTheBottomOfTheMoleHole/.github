name: "Report a Documentation Error"
description: "Report an issue in documentation, guidance, examples, or contribution notes."
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        # Thank you for raising a documentation issue

        Documentation issues are often a good starting point for contributors and help keep projects usable.

  - type: input
    id: affected_repository
    attributes:
      label: Affected Repository
      description: Which repository is affected?
      placeholder: "DownAtTheBottomOfTheMoleHole/repository-name"
    validations:
      required: true

  - type: input
    id: documentation_link
    attributes:
      label: Documentation Link
      description: Link to the affected file or page, if available.
      placeholder: "https://github.com/..."
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the documentation problem clearly.
    validations:
      required: true

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested Fix
      description: If you know what should change, describe it here.
    validations:
      required: false

  - type: dropdown
    id: will_contribute
    attributes:
      label: Would you like to implement a fix?
      options:
        - "No"
        - "Yes"
    validations:
      required: false

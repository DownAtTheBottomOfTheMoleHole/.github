name: "Report a Bug"
description: "Report unexpected behaviour, an error, or something that is not working as intended."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        # Thank you for raising a bug report

        Before opening a new issue, please search existing issues first in case the problem has already been reported.

  - type: input
    id: affected_repository
    attributes:
      label: Affected Repository
      description: Which repository is affected?
      placeholder: "DownAtTheBottomOfTheMoleHole/repository-name"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Give a short summary of the problem.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps needed to reproduce the problem.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs_and_errors
    attributes:
      label: Logs and Error Output
      description: Paste any relevant logs, stack traces, or error messages.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other useful context, screenshots, or links.
    validations:
      required: false

---
# Reusable Stale issue / PR management workflow — DownAtTheBottomOfTheMoleHole
#
# Call from another repo (typically on a schedule in the calling workflow):
#   jobs:
#     stale:
#       uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/stale.yml@main
#       secrets: inherit
#       permissions:
#         issues: write
#         pull-requests: write

name: 🕰️ Stale

on:
  workflow_call:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale
    runs-on: ubuntu-latest

    steps:
      - name: 🕰️ Mark and close stale issues and PRs
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ────────────────────────────────────────────────────────────
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in the past 60 days. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please comment
            or remove the `stale` label.
          close-issue-message: >
            This issue was closed automatically after 14 days of inactivity following
            the stale notice.
          days-before-issue-stale: 60
          days-before-issue-close: 14

          # ── Pull Requests ─────────────────────────────────────────────────────
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not
            had any activity in the past 30 days. It will be closed in 14 days if no
            further activity occurs. If this PR is still in progress, please comment
            or remove the `stale` label.
          close-pr-message: >
            This pull request was closed automatically after 14 days of inactivity
            following the stale notice.
          days-before-pr-stale: 30
          days-before-pr-close: 14

          # ── Exemptions ────────────────────────────────────────────────────────
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
          exempt-all-milestones: true

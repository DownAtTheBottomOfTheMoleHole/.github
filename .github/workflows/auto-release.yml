---
# Reusable GitHub Release workflow — DownAtTheBottomOfTheMoleHole
#
# Call from another repo:
#   on:
#     push:
#       tags:
#         - "v*"
#
#   jobs:
#     release:
#       uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/auto-release.yml@main
#       secrets: inherit
#       permissions:
#         contents: write

name: 🚀 Auto Release

on:
  workflow_call:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: � Checkout repository (needed for --verify-tag)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: �🔎 Check whether release already exists
        id: existing-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚀 Create GitHub release from tag
        if: steps.existing-release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag

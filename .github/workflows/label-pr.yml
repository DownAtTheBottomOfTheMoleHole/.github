---
# Reusable PR auto-labelling workflow — DownAtTheBottomOfTheMoleHole
#
# Applies labels based on the calling repo's .github/labeler.yml config.
# A baseline labeler.yml can be copied from:
#   DownAtTheBottomOfTheMoleHole/.github/.github/labeler.yml
#
# Call from another repo:
#   jobs:
#     label-pr:
#       uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/label-pr.yml@main
#       secrets: inherit
#       permissions:
#         contents: read
#         pull-requests: write

name: 🏷️ Label PR

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply Labels
    runs-on: ubuntu-latest

    steps:
      - name: 🏷️ Label PR
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false

  renovate-label:
    name: Label Renovate PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'renovate[bot]'

    steps:
      - name: 📦 Add dependencies label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ["dependencies"],
            });

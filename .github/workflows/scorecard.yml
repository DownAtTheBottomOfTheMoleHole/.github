---
# Reusable OSSF Scorecard workflow — DownAtTheBottomOfTheMoleHole
#
# Call from another repo:
#   jobs:
#     scorecard:
#       uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/scorecard.yml@main
#       secrets: inherit
#       permissions:
#         security-events: write
#         id-token: write
#         contents: read
#         actions: read

name: 🔍 OSSF Scorecard

on:
  workflow_call:

permissions:
  security-events: write
  id-token: write
  contents: read
  actions: read

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: 🔍 Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: 📤 Upload SARIF results
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          sarif_file: scorecard-results.sarif

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 30

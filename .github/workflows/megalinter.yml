---
# Reusable MegaLinter workflow — DownAtTheBottomOfTheMoleHole
#
# Call from another repo:
#   jobs:
#     megalinter:
#       uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/megalinter.yml@main
#       secrets: inherit
#       with:
#         apply-fixes: all
#         create-fix-pr: true

name: 🧹 MegaLinter

on:
  workflow_call:
    inputs:
      apply-fixes:
        description: "Which linters can auto-fix (all | none | <linter_key>)"
        type: string
        default: all
      create-fix-pr:
        description: "Open a PR with auto-fix commits instead of committing directly"
        type: boolean
        default: false
      validate-all:
        description: "Validate the full codebase (true) or only changed files (false)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Run MegaLinter
        uses: oxsecurity/megalinter@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9.5.0
        env:
          APPLY_FIXES: ${{ inputs.apply-fixes }}
          APPLY_FIXES_EVENT: pull_request
          APPLY_FIXES_MODE: ${{ inputs.create-fix-pr && 'pull_request' || 'commit' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ inputs.validate-all }}

      - name: 📤 Upload MegaLinter reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: megalinter-reports
          path: |
            megalinter-reports/
            mega-linter.log
          retention-days: 7

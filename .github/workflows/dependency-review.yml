---
# Reusable Dependency Review workflow — DownAtTheBottomOfTheMoleHole
#
# Call from another repo (triggers automatically on pull_request in calling repo):
#   jobs:
#     dependency-review:
#       uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/dependency-review.yml@main
#       secrets: inherit
#       permissions:
#         contents: read
#         pull-requests: write

name: 🔐 Dependency Review

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 🔐 Review Dependencies
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          warn-only: false

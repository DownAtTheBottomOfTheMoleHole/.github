---
# Reusable Dependency Review workflow — DownAtTheBottomOfTheMoleHole
#
# Call from another repo (triggers automatically on pull_request in calling repo):
#   jobs:
#     dependency-review:
#       uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/dependency-review.yml@main
#       secrets: inherit
#       permissions:
#         contents: read
#         pull-requests: write

name: 🔐 Dependency Review

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: 🔐 Review Dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          warn-only: false
